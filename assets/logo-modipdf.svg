<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" role="img" aria-label="ModiPdf — 가위로 잘리는 PDF 문서">
  <defs>
    <radialGradient id="mp-bg" cx="50%" cy="58%" r="73%">
      <stop offset="0%" stop-color="#23366b"/>
      <stop offset="100%" stop-color="#0b1128"/>
    </radialGradient>
    <linearGradient id="mp-blade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="55%" stop-color="#cdd8ec"/>
      <stop offset="100%" stop-color="#8896b0"/>
    </linearGradient>
  </defs>

  <rect width="96" height="96" rx="20" fill="url(#mp-bg)"/>

  <!-- 배지 중심 기준으로 전체를 확대 — 좌표는 그대로 두고 프레임만 키운다 -->
  <g transform="translate(48 48) scale(1.12) translate(-48 -48)">

  <!-- 문서 — 살짝 기울여 손에 든 느낌. 자기 중심(48,46) 기준 확대라 가위는 안 따라 커진다. -->
  <g transform="rotate(-5 48 49) translate(48 46) scale(1.2) translate(-48 -46)">
    <rect x="28" y="18" width="40" height="56" rx="4" fill="#f6f9ff"/>
    <!-- PDF 라벨 — 글자가 아니라 벡터 패스. Helvetica Neue/Arial 이 없는
         기기에서 다른 폰트로 대체되는 것을 막는다.
         원본: Arial Bold 14px / 재생성: python tools/trace-logo-text.py -->
    <path d="M34.27 35V24.98H37.52Q39.36 24.98 39.92 25.13Q40.78 25.35 41.36 26.11Q41.95 26.87 41.95 28.06Q41.95 28.98 41.61 29.61Q41.28 30.24 40.76 30.6Q40.24 30.96 39.71 31.08Q38.99 31.22 37.61 31.22H36.29V35ZM36.29 26.67V29.52H37.4Q38.6 29.52 39 29.36Q39.4 29.2 39.63 28.87Q39.86 28.53 39.86 28.09Q39.86 27.54 39.54 27.19Q39.22 26.83 38.73 26.74Q38.36 26.67 37.27 26.67ZM44.1 24.98H47.8Q49.05 24.98 49.71 25.17Q50.59 25.43 51.22 26.09Q51.84 26.76 52.17 27.72Q52.5 28.68 52.5 30.08Q52.5 31.32 52.19 32.22Q51.82 33.31 51.12 33.99Q50.59 34.5 49.7 34.79Q49.03 35 47.91 35H44.1ZM46.12 26.67V33.31H47.63Q48.48 33.31 48.86 33.22Q49.35 33.09 49.67 32.8Q50 32.5 50.2 31.83Q50.41 31.16 50.41 30Q50.41 28.83 50.2 28.21Q50 27.59 49.63 27.24Q49.26 26.89 48.69 26.77Q48.27 26.67 47.03 26.67ZM54.73 35V24.98H61.6V26.67H56.75V29.05H60.94V30.74H56.75V35Z" fill="#d93a3a"/>
    <!-- 본문 줄 -->
    <rect x="36" y="45" width="24" height="2.4" rx="1.2" fill="#c8d2e6"/>
    <rect x="36" y="51" width="24" height="2.4" rx="1.2" fill="#c8d2e6"/>
    <rect x="36" y="57" width="15" height="2.4" rx="1.2" fill="#c8d2e6"/>
  </g>

  <!-- 절취선 -->
  <line x1="14" y1="67" x2="82" y2="67" stroke="#7f8fae" stroke-width="1.6"
        stroke-dasharray="3.5 3.5" stroke-linecap="round"/>

  <!-- 가위 — 절취선을 따라 왼쪽으로 잘라 들어간다 -->
  <g stroke-linecap="round">
    <!-- 날: 흰 종이 위에서도 읽히도록 어두운 테두리를 깔고 밝은 날을 얹는다 -->
    <line x1="30" y1="71" x2="72" y2="60" stroke="#1b2542" stroke-width="5.4"/>
    <line x1="30" y1="60" x2="72" y2="71" stroke="#1b2542" stroke-width="5.4"/>
    <line x1="30" y1="71" x2="72" y2="60" stroke="url(#mp-blade)" stroke-width="3"/>
    <line x1="30" y1="60" x2="72" y2="71" stroke="url(#mp-blade)" stroke-width="3"/>
    <!-- 나사 -->
    <circle cx="51" cy="65.5" r="2.5" fill="#1b2542"/>
    <circle cx="51" cy="65.5" r="1.1" fill="#cdd8ec"/>
    <!-- 손잡이 -->
    <circle cx="78" cy="57" r="5" fill="none" stroke="#4c9dff" stroke-width="3"/>
    <circle cx="78" cy="74" r="5" fill="none" stroke="#4c9dff" stroke-width="3"/>
  </g>

  </g>
</svg>
