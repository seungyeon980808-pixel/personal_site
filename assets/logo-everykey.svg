<svg xmlns="http://www.w3.org/2000/svg" viewBox="10 10 100 100" width="120" height="120" role="img" aria-labelledby="everykey-title">
  <title id="everykey-title">EveryKey</title>
  <!-- 시안 1 '만능키'. tools/make_icon.py 의 좌표와 동일하게 유지할 것.
       ※ 퍼스널 사이트용 사본: 원본(20_autohotkey_master/new_EveryKey/assets/everykey.svg)은
         viewBox 가 "0 0 120 120" 이라 배지 둘레에 10px 여백이 있다. 카드에 나란히 놓으면
         이 아이콘만 83% 크기로 작아 보이고 그림자가 배지에서 떠서, viewBox 를 배지 영역으로
         잘랐다. 좌표는 원본 그대로다 — 프레임만 다르다. -->
  <mask id="everykey-key">
    <rect width="120" height="120" fill="#000"/>
    <circle cx="42" cy="60" r="20" fill="#fff"/>
    <rect x="68" y="60" width="10" height="24" fill="#fff"/>
    <rect x="88" y="60" width="10" height="16" fill="#fff"/>
    <rect x="42" y="54" width="56" height="12" rx="6" fill="#fff"/>
    <circle cx="42" cy="60" r="9" fill="#000"/>
  </mask>
  <rect x="10" y="10" width="100" height="100" rx="24" fill="#0969da"/>
  <rect width="120" height="120" fill="#fff" mask="url(#everykey-key)"/>
</svg>
