<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" role="img" aria-label="ObsidianHub — 옵시디언 노트가 폴더로 모인다">
  <defs>
    <radialGradient id="oh-bg" cx="50%" cy="58%" r="73%">
      <stop offset="0%" stop-color="#23366b"/>
      <stop offset="100%" stop-color="#0b1128"/>
    </radialGradient>
    <linearGradient id="oh-front" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffd776"/>
      <stop offset="100%" stop-color="#f0ad38"/>
    </linearGradient>

    <!-- 옵시디언풍 결정 — 원점 기준, 높이 약 24 -->
    <g id="oh-gem">
      <path d="M0,-12 L9,-4 L6,10 L-6,10 L-9,-4 Z" fill="#8b6df0"/>
      <path d="M0,-12 L9,-4 L0,3 Z" fill="#c9b6ff"/>
      <path d="M0,-12 L-9,-4 L0,3 Z" fill="#7452e0"/>
      <path d="M9,-4 L6,10 L0,3 Z" fill="#a88cf7"/>
      <path d="M-9,-4 L-6,10 L0,3 Z" fill="#6d4bd6"/>
    </g>
  </defs>

  <rect width="96" height="96" rx="20" fill="url(#oh-bg)"/>

  <!-- 던져지는 궤적 — 결정을 키운 만큼 겹치지 않게 물러나 있다 -->
  <path d="M46 7 q9 3 12 8" fill="none" stroke="#7286ad" stroke-width="1.5"
        stroke-dasharray="2.5 3.5" stroke-linecap="round" opacity="0.7"/>
  <path d="M17 17 q7 3 9 7" fill="none" stroke="#7286ad" stroke-width="1.5"
        stroke-dasharray="2.5 3.5" stroke-linecap="round" opacity="0.45"/>

  <!-- 폴더 뒷판 + 탭 -->
  <path d="M19,42 h14 l4,5 h39 a5,5 0 0 1 5,5 v27 a5,5 0 0 1 -5,5 h-57 a5,5 0 0 1 -5,-5 v-32 a5,5 0 0 1 5,-5 z"
        fill="#dfa53c"/>

  <!-- 결정 2개 — 앞판 뒤에 놓여 폴더로 빨려드는 착시 -->
  <use href="#oh-gem" transform="translate(38 48) rotate(-16) scale(1.28)"/>
  <use href="#oh-gem" transform="translate(64 32) rotate(24) scale(1.02)"/>

  <!-- 폴더 앞판 — 뒷판보다 살짝 넓게 나와 앞으로 튀어나온 느낌 -->
  <path d="M17,54 h62 a4,4 0 0 1 4,4 v23 a5,5 0 0 1 -5,5 h-60 a5,5 0 0 1 -5,-5 v-23 a4,4 0 0 1 4,-4 z"
        fill="url(#oh-front)"/>
  <path d="M17,54 h62 a4,4 0 0 1 4,4 h-70 a4,4 0 0 1 4,-4 z" fill="#ffe3a6" opacity="0.75"/>
</svg>
