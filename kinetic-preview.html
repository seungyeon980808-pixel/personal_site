<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>5E 타이포 시안 · 미리보기</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  /* =====================================================================
     5E 키네틱 타이포 v6 — 17.9초 루프 / 640×400

     v5 지적과 대응
       ① E 가 전부 같은 방향   → 5개가 72° 씩 다른 방향(바람개비)으로 튀어나가고,
                                 마지막에 그 다섯 방향에서 되돌아와 합쳐진다.
       ② 5E 마크가 작음        → 최종 102px → 150px.
       ③ 한글 카피가 작고 흐림 → 14px 흐린 회색 → 17px 밝은 색.
       ④ 색을 안 씀            → "온통 푸른색이라 짜친다"를 '파랑을 줄여라'로 잘못
                                 읽고 무채색으로 갔다. 반대였다. E 5개에 각각 고유색을
                                 줘서 바람개비가 곧 색 바퀴가 되게 했다.
       ⑤ 영상이 작음           → 268×168 → 348×218 (가로세로 30%).
                                 560 폭에는 26px 이 모자라 스테이지를 640×400 으로.
       ⑥ 영상이 중앙으로 날아감→ 합쳐지는 건 E 만. 영상은 제자리에서 조용히 사라진다.
     ===================================================================== */
  :root {
    --accent: #4c9dff;
    --ink: #eef1f6;
    --dim: #8a93a3;
    --dimmer: #5b6473;
    --line: rgba(255,255,255,0.09);
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; padding: 24px; background: #050609; color: var(--ink);
    font-family: "IBM Plex Sans KR", system-ui, sans-serif;
    display: flex; flex-direction: column; align-items: center; gap: 14px;
  }
  h1 { font-size: 16px; font-weight: 600; margin: 0; }
  .hint { font-size: 13px; color: var(--dim); margin: 0; text-align: center; line-height: 1.7; }
  .hint b { color: var(--accent); font-weight: 600; }

  .ctl {
    display: flex; align-items: center; gap: 9px; flex-wrap: wrap; justify-content: center;
    padding: 10px 14px; border: 1px solid var(--line); border-radius: 999px; background: #0d1014;
  }
  .ctl button {
    font: inherit; font-size: 12px; padding: 5px 13px; border-radius: 999px;
    border: 1px solid var(--line); background: transparent; color: var(--dim); cursor: pointer;
  }
  .ctl button:hover { border-color: var(--accent); color: var(--accent); }
  .ctl button.on { background: var(--accent); border-color: var(--accent); color: #05070a; font-weight: 600; }
  .ctl input[type=range] { width: 300px; }
  .ctl .t { font-family: "IBM Plex Mono", monospace; font-size: 12px; color: var(--dimmer); min-width: 84px; text-align: center; }

  /* ===== STAGE 660×372 (배너형 — 영상이 차지하는 비중을 키운다) ===== */
  .k5 {
    position: relative; width: min(660px, 94vw); aspect-ratio: 660 / 372;
    border-radius: 16px; overflow: hidden;
    background: radial-gradient(130% 105% at 24% 12%, #171b24 0%, #0b0d12 54%, #06070a 100%);
    border: 1px solid var(--line);
    box-shadow: 0 34px 80px -30px rgba(0,0,0,0.95);
    perspective: 1100px; perspective-origin: 50% 50%;
  }
  .k5-cam { position: absolute; inset: 0; transform-style: preserve-3d; }
  .k5-c { position: absolute; left: 50%; top: 50%; }

  .k5-glow {
    width: 560px; height: 560px; margin: -280px 0 0 -280px; border-radius: 50%;
    background: radial-gradient(closest-side, rgba(76,157,255,0.15), rgba(76,157,255,0) 72%);
    pointer-events: none;
  }
  /* 과목 틴트 — 배경 전체를 그 과목 쪽으로 아주 살짝 기울인다 (색은 JS 가 넣는다) */
  .k5-tint {
    width: 900px; height: 700px; margin: -350px 0 0 -450px;
    opacity: 0; pointer-events: none;
  }
  .k5-vig {
    position: absolute; inset: 0; pointer-events: none;
    background: radial-gradient(118% 88% at 50% 45%, transparent 56%, rgba(0,0,0,0.62) 100%);
  }
  .k5-flash { position: absolute; inset: 0; background: #eaf1ff; opacity: 0; pointer-events: none; mix-blend-mode: screen; }

  /* ---- 왼쪽: 글자 칼럼 ---- */
  .k5-idx {
    font-family: "IBM Plex Mono", monospace; font-size: 11px; letter-spacing: 0.18em;
    color: var(--dimmer); opacity: 0; white-space: nowrap;
  }
  .k5-word {
    white-space: nowrap; opacity: 0; text-align: right;
    font-size: 25px; font-weight: 700; letter-spacing: -0.02em; color: var(--ink);
  }
  .k5-rule {
    width: 1px; height: 190px; margin: -95px 0 0 0;
    background: linear-gradient(180deg, transparent, var(--line) 22%, var(--line) 78%, transparent);
    opacity: 0;
  }

  /* ---- 오른쪽: 영상 프레임 — 원본이 1920×1080 이라 16:9 로 맞췄다 ---- */
  .k5-frame {
    width: 462px; height: 260px; margin: -130px 0 0 -231px;
    border-radius: 13px; overflow: hidden;
    background: #101318;
    border: 1px solid var(--line);
    box-shadow: 0 26px 56px -22px rgba(0,0,0,1), inset 0 1px 0 rgba(255,255,255,0.05);
    opacity: 0;
  }
  .k5-clip {
    position: absolute; inset: 0; opacity: 0;
    display: flex; align-items: center; justify-content: center;
    background: linear-gradient(158deg, #171b21 0%, #0f1216 100%);
  }
  .k5-clip video, .k5-clip img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .k5-clip .ph { font-family: "IBM Plex Mono", monospace; font-size: 13px; color: #4e5663; letter-spacing: 0.06em; }
  .k5-cap { font-size: 13px; color: var(--dim); white-space: nowrap; opacity: 0; }

  .k5-dots { display: flex; gap: 7px; opacity: 0; }
  .k5-dot { width: 14px; height: 2px; border-radius: 1px; background: rgba(255,255,255,0.16); }
  .k5-dot i { display: block; height: 100%; width: 0; border-radius: 1px; }

  /* ---- 바람개비로 날아가는 E (색은 JS 가 넣는다) ---- */
  .k5-e {
    font-family: Georgia, "Times New Roman", serif; font-style: italic; font-weight: 600;
    font-size: 34px; opacity: 0; margin: -24px 0 0 -12px;
  }

  /* 합체 카운터 — E → 2E → 3E → 4E → 5E 로 빠르게 올라간다 */
  .k5-count {
    font-family: Georgia, "Times New Roman", serif; font-style: italic; font-weight: 600;
    font-size: 88px; color: #fff; opacity: 0; white-space: nowrap;
    margin: -62px 0 0 -80px; width: 160px; text-align: center;
    text-shadow: 0 0 44px rgba(90,162,255,0.85);
  }

  /* ---- 최종 5E (150px) ---- */
  /* 마크는 CSS 로 흉내 내지 않고 실제 로고 SVG 를 그대로 쓴다.
     직접 그렸더니 그라데이션 색(#24324f vs 원본 #23366b)과 모서리 반경이
     미묘하게 달라, 인계 순간 아이콘이 바뀌는 게 눈에 띄었다.
     모서리는 SVG 자체가 rx=20/96 으로 둥글다 — 같은 비율만 맞춰준다. */
  .k5-final {
    width: 150px; height: 150px; margin: -75px 0 0 -75px;
    border-radius: 20.8%;
    box-shadow: 0 28px 64px -18px rgba(0,0,0,1);
    display: flex; align-items: center; justify-content: center;
    opacity: 0; overflow: hidden;
  }
  .k5-final img { width: 100%; height: 100%; display: block; }
  .k5-sweep {
    position: absolute; top: -60%; left: -120%; width: 55%; height: 220%;
    background: linear-gradient(100deg, transparent, rgba(255,255,255,0.5), transparent);
    transform: rotate(18deg); pointer-events: none;
  }
  /* 락인 순간 다섯 색이 차례로 퍼진다 */
  .k5-ring {
    width: 150px; height: 150px; margin: -75px 0 0 -75px;
    border-radius: 50%; border: 1.5px solid currentColor; opacity: 0; pointer-events: none;
  }

  .k5-stackword {
    white-space: nowrap; opacity: 0; font-size: 27px; font-weight: 700;
    letter-spacing: -0.02em; color: var(--ink);
  }
  /* ③ 한글 카피 — 크고 밝게 */
  .k5-tag {
    font-size: 17px; font-weight: 500; color: #e6ecf7; white-space: nowrap; opacity: 0;
    letter-spacing: -0.01em;
  }

  @media (prefers-reduced-motion: reduce) { .k5 * { animation: none !important; } }

  /* ?clean=1 — 녹화용. 제목·설명·조작판을 감추고 무대만 남긴다.
     화면 녹화로 잘라낼 때 UI 가 같이 찍히지 않는다. */
  body.clean { padding: 0; background: #000; height: 100vh; justify-content: center; gap: 0; }
  body.clean h1, body.clean .hint, body.clean .ctl { display: none; }
  body.clean .k5 { width: min(1100px, 96vw); border-radius: 0; border: 0; box-shadow: none; }
</style>
</head>
<body>

<h1>5E 타이포 시안 v6 · 17.9초 루프 · 640×400</h1>
<p class="hint">
  E 5개가 <b>각자 다른 방향</b>으로 튀어나갔다가 마지막에 되돌아와 합쳐집니다.<br />
  <b>🔊 소리</b>를 켜면 코드로 합성한 사운드가 함께 재생됩니다.
</p>

<div class="ctl">
  <button id="play">⏸ 일시정지</button>
  <button id="restart">↺ 처음부터</button>
  <button id="sound">🔊 소리 켜기</button>
  <input type="range" id="scrub" min="0" max="17900" step="10" value="0" />
  <span class="t" id="time">0.00s / 17.9s</span>
  <button data-rate="0.25">0.25×</button>
  <button data-rate="0.5">0.5×</button>
  <button data-rate="1" class="on">1×</button>
</div>

<div class="k5" id="stage">
  <div class="k5-cam" id="cam">
    <!-- 과목별 배경 틴트 — 실제 5E 가 과목을 고르면 UI 전체 톤이 기울는 것과 같은 방식 -->
    <div class="k5-c k5-tint" data-tint="0"></div>
    <div class="k5-c k5-tint" data-tint="1"></div>
    <div class="k5-c k5-tint" data-tint="2"></div>
    <div class="k5-c k5-tint" data-tint="3"></div>
    <div class="k5-c k5-tint" data-tint="4"></div>
    <div class="k5-c k5-glow" id="glow"></div>
    <div class="k5-c k5-rule" id="rule"></div>

    <div class="k5-c k5-frame" id="frame">
      <div class="k5-clip" data-clip="0"><video src="assets/demo/01-object-convert.mp4" muted playsinline preload="auto"></video></div>
      <div class="k5-clip" data-clip="1"><video src="assets/demo/02-library.mp4" muted playsinline preload="auto"></video></div>
      <div class="k5-clip" data-clip="2"><video src="assets/demo/03-graph.mp4" muted playsinline preload="auto"></video></div>
      <div class="k5-clip" data-clip="3"><video src="assets/demo/04-snap.mp4" muted playsinline preload="auto"></video></div>
      <div class="k5-clip" data-clip="4"><video src="assets/demo/05-slope.mp4" muted playsinline preload="auto"></video></div>
      </div>
    <div class="k5-c k5-cap" data-cap="0">오브젝트 변환</div>
    <div class="k5-c k5-cap" data-cap="1">기출 라이브러리</div>
    <div class="k5-c k5-cap" data-cap="2">좌표 &amp; 함수</div>
    <div class="k5-c k5-cap" data-cap="3">오브젝트 스냅</div>
    <div class="k5-c k5-cap" data-cap="4">경사면 처리</div>
    <div class="k5-c k5-dots" id="dots">
      <span class="k5-dot"><i></i></span><span class="k5-dot"><i></i></span><span class="k5-dot"><i></i></span>
      <span class="k5-dot"><i></i></span><span class="k5-dot"><i></i></span>
    </div>

    <div class="k5-c k5-idx" id="idx">01 / 05</div>
    <div class="k5-c k5-word" data-w="0">sci<b>E</b>nce</div>
    <div class="k5-c k5-word" data-w="1"><b>E</b>ducational</div>
    <div class="k5-c k5-word" data-w="2"><b>E</b>xam</div>
    <div class="k5-c k5-word" data-w="3"><b>E</b>asy</div>
    <div class="k5-c k5-word" data-w="4"><b>E</b>ditor</div>

    <div class="k5-c k5-e" data-e="0">E</div>
    <div class="k5-c k5-e" data-e="1">E</div>
    <div class="k5-c k5-e" data-e="2">E</div>
    <div class="k5-c k5-e" data-e="3">E</div>
    <div class="k5-c k5-e" data-e="4">E</div>

    <div class="k5-c k5-count" id="count">E</div>
    <div class="k5-c k5-ring" data-ring="0"></div>
    <div class="k5-c k5-ring" data-ring="1"></div>
    <div class="k5-c k5-ring" data-ring="2"></div>
    <div class="k5-c k5-ring" data-ring="3"></div>
    <div class="k5-c k5-ring" data-ring="4"></div>
    <div class="k5-c k5-final" id="final"><img src="assets/logo-5e.svg" alt="" /><span class="k5-sweep" id="sweep"></span></div>

    <div class="k5-c k5-stackword" data-s="0">sci<b>E</b>nce</div>
    <div class="k5-c k5-stackword" data-s="1"><b>E</b>ducational</div>
    <div class="k5-c k5-stackword" data-s="2"><b>E</b>xam</div>
    <div class="k5-c k5-stackword" data-s="3"><b>E</b>asy</div>
    <div class="k5-c k5-stackword" data-s="4"><b>E</b>ditor</div>
    <div class="k5-c k5-tag" id="tag">교사를 위한 과학 시험용 그림 에디터</div>
  </div>
  <div class="k5-vig"></div>
  <div class="k5-flash" id="flash"></div>
</div>

<script>
/* =======================================================================
   레이아웃 (640×400, 원점 = 중앙)
     글자 칼럼 오른쪽 끝  x = -112
     영상 프레임 중심     x = +114  (348×218) → 왼쪽 끝 -60
   → 52px 간격. 겹칠 수 없다.
   ======================================================================= */
// 마지막 동작은 15.85s 에 끝난다. 그 뒤 정지 구간이 3.35초나 되어 답답했다.
// 60% 줄여 1.34초만 머물게 하고 총 길이도 그만큼 짧아졌다 (20 → 17.9).
const SEC = 17.9, DUR = SEC * 1000;
// 640 폭 안에서 영상을 최대로 키운 값.
//   가장 긴 단어 "Educational" 161px 을 왼쪽 여백 20px 에 붙이면 TEXT_R = -139,
//   글자와 영상 사이 32px 을 띄우고 오른쪽 여백 20px 을 남기면 프레임은 407px.
// 실제 영상이 1920×1080(16:9)이라 프레임도 16:9. 16:10 이면 좌우가 잘린다.
const TEXT_R = -176;
const FRAME_X = 79, FRAME_W = 462, FRAME_H = 260;
// 프레임 아래에 캡션·진행바가 붙어 덩어리가 아래로 치우친다.
// 재생 구간 전체를 이만큼 올려 화면 가운데에 맞춘다.
const PLAY_Y = -24;

/* ④ E 다섯 개의 색 — 5E 프로그램의 실제 과목 테마에서 가져왔다.
   출처: 51_5E/5E_hub/css/style.css  :root[data-subject=...] --accent
     물리 = 기본 블루 #2f81f7 / 화학 = 버건디 #b03a4a
     생명 = 틸 #0f8a72        / 지구 = 우디 브라운 #a5794a
   보라(확장판)는 코드에 정의가 없어, 같은 톤(채도 낮은 고급 계열)으로 맞춰 지었다.
   실제 값이 따로 있으면 PURPLE 만 바꾸면 된다. */
const SUBJ = {
  physics: "#2f81f7", chem: "#b03a4a", bio: "#0f8a72", earth: "#a5794a", pro: "#7d5bbe",
};
const EC = [SUBJ.physics, SUBJ.chem, SUBJ.bio, SUBJ.earth, SUBJ.pro];
/* 합쳐진 뒤 세로 글자가 물드는 색 (= 프로그램 기본 블루) */
const BLUE = "#2f81f7", BLUE_LT = "#5ea1f7";

/* 타이밍
   영상마다 길이가 달라서(2.00 ~ 2.70초) 고정 노출을 쓰면 짧은 건 얼어붙고
   긴 건 잘린다. 각 영상의 실제 길이만큼 자리를 준다. */
const N = 5;
const VDUR = [2.00, 2.00, 2.70, 2.00, 2.63];   // 실측값 (브라우저 metadata)
const V0 = 0.20, VX = 0.001;
const VIN_T = [], VOUT_T = [];
(function () {
  let t = V0;
  for (let i = 0; i < N; i++) { VIN_T.push(t); t += VDUR[i]; VOUT_T.push(t); t += VX; }
})();
const VEND = VOUT_T[N - 1];            // ≈ 11.53
const FADE0 = VEND;                     // 영상 페이드아웃 시작

/* E 복귀 — 한 개씩 순차로 부르니 늘어져서, 한 방에 처리하는 쪽으로 바꿨다.
     A. 다섯이 동시에 날아 들어와 중앙 둘레에 선다   (0.38초)
     B. 다 같이 한 바퀴 돈다                          (0.52초)
     C. 안쪽으로 빠르게 하나씩 빨려들며 E→2E→3E→4E→5E (0.40초)
   총 1.30초. 이전 순차 방식(2.4초)의 절반. */
const E_LEAVE_LAST = VOUT_T[N - 1] - 0.34;
const BACK0   = E_LEAVE_LAST + 0.95;   // 마지막 E 가 다 날아간 뒤 시작
const RING_R  = 104;                   // 한 바퀴 도는 반지름
const ARR     = BACK0 + 0.38;          // 둘레에 도착
const ORB_END = ARR + 0.52;            // 한 바퀴 완료
const MSTAG   = 0.075;                 // 하나씩 빨려드는 간격
const MERGE_T = i => ORB_END + i * MSTAG;
const LOCK  = MERGE_T(N - 1) + 0.26;
const SLIDE = LOCK + 0.30;
const TAGT  = LOCK + 0.78;

/* 최종 배치 */
const GROUP_Y = -16, LOGO_X = -136, STACK_EX = 6, LINE_H = 40, TAG_DY = 2 * LINE_H + 52;
/* 세로 글자가 파랗게 물들기 시작하는 시각 (마지막 줄이 자리잡은 뒤) */
const WASH0 = SLIDE + 0.95;

const anims = [];
function track(el, stops) {
  // 키프레임 시각은 반드시 오름차순이어야 한다. 어긋나면 el.animate 가 예외를 던지고
  // build() 가 그 자리에서 죽어 '이후 요소가 전부 사라지는' 형태로 나타난다.
  // (실제로 그렇게 마무리 전체가 통째로 안 보이는 사고가 있었다)
  // 조용히 죽지 않도록 어느 요소의 몇 번째 스톱이 문제인지 찍어준다.
  for (let i = 1; i < stops.length; i++) {
    if (stops[i][0] < stops[i - 1][0]) {
      console.error("[k5] 키프레임 시각 역전:", el.className || el.id,
        "stop#" + i, stops[i - 1][0].toFixed(3) + "s → " + stops[i][0].toFixed(3) + "s");
    }
  }
  const kf = stops.map(([s, p, e]) => {
    const f = { offset: Math.min(1, Math.max(0, s / SEC)) };
    Object.assign(f, p); if (e) f.easing = e; return f;
  });
  const a = el.animate(kf, { duration: DUR, iterations: Infinity, fill: "both" });
  anims.push(a); return a;
}
const SNAP = "cubic-bezier(0.16, 1, 0.3, 1)";
const WHIP = "cubic-bezier(0.85, 0, 0.95, 0.25)";
const LIN  = "linear";
function vIn(i)  { return VIN_T[i]; }
function vOut(i) { return VOUT_T[i]; }

(document.fonts ? document.fonts.ready : Promise.resolve()).then(build);

function build() {
  /* 색 입히기 — 단어의 E 와 날아가는 E 가 같은 색 */
  document.querySelectorAll(".k5-word").forEach((w, i) => {
    const b = w.querySelector("b"); if (b) b.style.color = EC[i];
  });
  document.querySelectorAll(".k5-stackword").forEach((w, i) => {
    const b = w.querySelector("b"); if (b) b.style.color = EC[i];
  });
  document.querySelectorAll(".k5-e").forEach((e, i) => {
    e.style.color = EC[i];
    e.style.textShadow = "0 0 26px " + EC[i] + "88";
  });
  document.querySelectorAll(".k5-ring").forEach((r, i) => { r.style.color = EC[i]; });
  document.querySelectorAll(".k5-dot i").forEach((b, i) => { b.style.background = EC[i % 5]; });

  /* 과목 틴트: 해당 영상이 나오는 동안 배경이 그 과목 색으로 물든다 */
  document.querySelectorAll(".k5-tint").forEach((el, i) => {
    el.style.background =
      `radial-gradient(closest-side, ${EC[i]}2e, ${EC[i]}00 70%)`;
    const a = vIn(i), b = vOut(i);
    // 첫 영상은 0.20s 에 시작하므로 a-0.30 이 음수가 된다 → 0 아래로 못 내려가게 막는다
    const fadeIn = Math.max(0.01, a - 0.30);
    track(el, [
      [0,        { opacity: 0 }],
      [fadeIn,   { opacity: 0 }, LIN],
      [a + 0.30, { opacity: 1 }, LIN],
      [b,        { opacity: 1 }, LIN],
      [b + 0.30, { opacity: 0 }],
      [17.90,       { opacity: 0 }],
    ]);
  });

  /* ---- 카메라 ---- */
  track(document.getElementById("cam"), [
    [0,           { transform: "translateZ(-60px)" }, LIN],
    [BACK0,       { transform: "translateZ(0px)" }, WHIP],
    [LOCK - 0.05, { transform: "translateZ(46px)" }, SNAP],
    [LOCK + 0.06, { transform: "translateZ(-110px)" }, SNAP],
    [SLIDE,       { transform: "translateZ(0px)" }, SNAP],
    [17.90,          { transform: "translateZ(12px)" }],
  ]);
  track(document.getElementById("glow"), [
    [0,           { opacity: 0.4, transform: "scale(0.85)" }, LIN],
    [BACK0,       { opacity: 0.55, transform: "scale(1.0)" }, SNAP],
    [LOCK + 0.14, { opacity: 1, transform: "scale(1.45)" }, SNAP],
    [SLIDE,       { opacity: 0.5, transform: "scale(1.05)" }, LIN],
    [17.90,          { opacity: 0.4, transform: "scale(0.85)" }],
  ]);

  /* ---- ⑥ 영상 프레임: 제자리에서 조용히 사라진다 (중앙으로 날아가지 않는다) ---- */
  const FR = `translate(${FRAME_X}px, ${PLAY_Y}px)`;
  track(document.getElementById("frame"), [
    [0,          { opacity: 0, transform: FR + " translateZ(-70px) scale(0.96)" }],
    [V0 - 0.18,  { opacity: 0, transform: FR + " translateZ(-70px) scale(0.96)" }, SNAP],
    [V0 + 0.10,  { opacity: 1, transform: FR + " translateZ(0px) scale(1)" }, LIN],
    [FADE0,      { opacity: 1, transform: FR + " translateZ(0px) scale(1)" }, LIN],
    [FADE0 + 0.60, { opacity: 0, transform: FR + " translateZ(0px) scale(0.99)" }],

  /* ---- 영상: 한 번에 하나 (하드컷 + 느린 줌) ---- */

      [a - VX,   { opacity: 0, transform: "scale(1.07)" }, LIN],

      [a + 0.22, { opacity: 1, transform: P }, LIN],
      [off,      { opacity: 1, transform: P }, LIN],

  track(dots, [
    [0,           { opacity: 0, transform: DP }],
    [V0 + 0.1,    { opacity: 0, transform: DP }, LIN],
    [V0 + 0.5,    { opacity: 1, transform: DP }, LIN],
    [FADE0,       { opacity: 1, transform: DP }, LIN],
    [FADE0 + 0.45,{ opacity: 0, transform: DP }],
    [17.90,          { opacity: 0, transform: DP }],

  dots.querySelectorAll("i").forEach((bar, i) => {
    track(bar, [
      [0,          { width: "0%" }],

  /* ---- 왼쪽 세로선 ---- */
  const RP = `translate(${TEXT_R + 18}px, ${PLAY_Y}px)`;
  track(document.getElementById("rule"), [
    [0,          { opacity: 0, transform: RP + " scaleY(0.3)" }],
    [V0,         { opacity: 0, transform: RP + " scaleY(0.3)" }, SNAP],
    [V0 + 0.6,   { opacity: 1, transform: RP + " scaleY(1)" }, LIN],
    [FADE0,      { opacity: 1, transform: RP + " scaleY(1)" }, WHIP],
    [FADE0 + 0.4,{ opacity: 0, transform: RP + " scaleY(0.3)" }],
    [17.90,         { opacity: 0, transform: RP + " scaleY(0.3)" }],
  ]);

  /* ---- 인덱스 ---- */
  const idx = document.getElementById("idx");
  const iX = TEXT_R - idx.offsetWidth, iY = -66 + PLAY_Y;
  track(idx, [
    [0,          { opacity: 0, transform: `translate(${iX}px, ${iY + 6}px)` }],
    [V0 + 0.2,   { opacity: 0, transform: `translate(${iX}px, ${iY + 6}px)` }, SNAP],
    [V0 + 0.7,   { opacity: 1, transform: `translate(${iX}px, ${iY}px)` }, WHIP],
    [FADE0,      { opacity: 1, transform: `translate(${iX}px, ${iY}px)` }, WHIP],
    [FADE0 + 0.35, { opacity: 0, transform: `translate(${iX}px, ${iY - 8}px)` }],
    [17.90,         { opacity: 0, transform: `translate(${iX}px, ${iY - 8}px)` }],
  ]);

  /* ---- 단어 5개 ---- */
  const words = [...document.querySelectorAll(".k5-word")];
  const wW = words.map(w => w.offsetWidth), wH = words.map(w => w.offsetHeight);
  const eX = words.map(w => { const b = w.querySelector("b"); return b.offsetLeft + b.offsetWidth / 2; });
  const eY = words.map(w => { const b = w.querySelector("b"); return b.offsetTop + b.offsetHeight / 2; });
  const LEAVE = [];

  words.forEach((el, i) => {
    const a = vIn(i), b = vOut(i);
    const X = TEXT_R - wW[i], Y = -wH[i] / 2 + 4 + PLAY_Y;
    const P = `translate(${X}px, ${Y}px)`;
    LEAVE.push(b - 0.34);
    track(el, [
      [0,        { opacity: 0, transform: `translate(${X + 28}px, ${Y}px)`, filter: "blur(6px)" }],
      [a - VX,   { opacity: 0, transform: `translate(${X + 28}px, ${Y}px)`, filter: "blur(6px)" }, SNAP],
      [a + 0.34, { opacity: 1, transform: P, filter: "blur(0px)" }, LIN],
      [b - 0.34, { opacity: 1, transform: P, filter: "blur(0px)" }, WHIP],
      [b - 0.02, { opacity: 0, transform: `translate(${X - 20}px, ${Y}px)`, filter: "blur(5px)" }],
      [17.90,       { opacity: 0, transform: `translate(${X - 20}px, ${Y}px)`, filter: "blur(5px)" }],
    ]);
  });

  /* ---- ① E: 바람개비로 튀어나갔다가 마지막에 되돌아와 합쳐진다 ----
     각 E 는 (i*72 - 90)° 방향으로 화면 밖까지 날아가고,
     BACK0 시점에 그 방향에서 다시 들어와 중앙에서 만난다. */
  // 목표점을 절대좌표로 잡으면 E 마다 출발 위치가 달라 실제 이동 각도가 틀어진다.
  // (측정해보니 간격이 41~93° 로 들쭉날쭉했다)
  // 반드시 '출발점 + 방향×거리' 로 잡아야 정확히 72° 씩 벌어진 바람개비가 된다.
  // 거리는 다섯 방향 모두 화면(640×400) 밖으로 나가도록 560 으로 잡았다.
  const OUT_R = 560;
  document.querySelectorAll(".k5-e").forEach((el, i) => {
    const t = LEAVE[i];
    const sx = TEXT_R - wW[i] + eX[i];
    const sy = -wH[i] / 2 + 4 + PLAY_Y + eY[i];
    const ang = (i * 72 - 90) * Math.PI / 180;
    const ox = sx + Math.cos(ang) * OUT_R;   // 출발점 기준
    const oy = sy + Math.sin(ang) * OUT_R;
    const spin = 300 + i * 40;
    const bx = ox, by = oy;   // 나갔던 그 자리에서 되돌아온다
    const degA = i * 72 - 90;                 // 이 E 의 둘레 위치(도)
    const ringXY = (deg) => {
      const r = deg * Math.PI / 180;
      return [Math.cos(r) * RING_R, Math.sin(r) * RING_R];
    };
    const mT = MERGE_T(i);

    const stops = [
      [0,        { opacity: 0, transform: `translate(${sx}px, ${sy}px) scale(1) rotate(0deg)`, filter: "blur(0px)" }],
      [t - 0.02, { opacity: 0, transform: `translate(${sx}px, ${sy}px) scale(1) rotate(0deg)`, filter: "blur(0px)" }, SNAP],
      [t + 0.10, { opacity: 1, transform: `translate(${sx + (ox - sx) * 0.10}px, ${sy + (oy - sy) * 0.10}px) scale(1.15) rotate(${spin * 0.1}deg)`, filter: "blur(0px)" }, WHIP],
      [t + 0.85, { opacity: 0, transform: `translate(${ox}px, ${oy}px) scale(0.85) rotate(${spin}deg)`, filter: "blur(6px)" }, LIN],
      // A. 다섯이 한꺼번에 날아 들어온다
      [BACK0,    { opacity: 0, transform: `translate(${bx}px, ${by}px) scale(0.9) rotate(${spin}deg)`, filter: "blur(6px)" }, LIN],
      [BACK0 + 0.08, { opacity: 1, transform: `translate(${bx * 0.72}px, ${by * 0.72}px) scale(1.1) rotate(${spin + 30}deg)`, filter: "blur(0px)" }, SNAP],
    ];
    // B. 다 같이 한 바퀴 (부드럽게 보이도록 60° 씩 6등분으로 샘플링)
    const STEPS = 6;
    for (let k = 0; k <= STEPS; k++) {
      const p = k / STEPS;
      const [x, y] = ringXY(degA + 360 * p);
      stops.push([ARR + (ORB_END - ARR) * p, {
        opacity: 1,
        transform: `translate(${x.toFixed(1)}px, ${y.toFixed(1)}px) scale(1) rotate(${(spin + 360 * p).toFixed(0)}deg)`,
        filter: "blur(0px)",
      }, LIN]);
    }
    // C. 안쪽으로 빨려든다 (i 번째는 MSTAG 만큼 늦게)
    const [hx, hy] = ringXY(degA + 360);
    stops.push([mT, { opacity: 1, transform: `translate(${hx.toFixed(1)}px, ${hy.toFixed(1)}px) scale(1) rotate(${spin + 360}deg)`, filter: "blur(0px)" }, WHIP]);
    stops.push([mT + 0.16, { opacity: 1, transform: `translate(0px, 0px) scale(0.42) rotate(${spin + 470}deg)`, filter: "blur(0px)" }, LIN]);
    stops.push([mT + 0.21, { opacity: 0, transform: `translate(0px, 0px) scale(0.3) rotate(${spin + 490}deg)`, filter: "blur(0px)" }]);
    stops.push([17.90, { opacity: 0, transform: "translate(0px, 0px) scale(0.3)", filter: "blur(0px)" }]);
    track(el, stops);
  });

  /* ---- 락인: 다섯 색 링이 차례로 퍼진다 ---- */
  document.querySelectorAll(".k5-ring").forEach((el, i) => {
    const t = MERGE_T(i) + 0.14;   // 빨려드는 순간마다 그 색으로 한 번씩
    track(el, [
      [0,        { opacity: 0, transform: "scale(0.55)" }],
      [t,        { opacity: 0, transform: "scale(0.55)" }, SNAP],
      [t + 0.06, { opacity: 0.85, transform: "scale(0.85)" }, SNAP],
      [t + 0.95, { opacity: 0, transform: "scale(3.1)" }],
      [17.90,       { opacity: 0, transform: "scale(3.1)" }],
    ]);
  });

  /* ---- 합체 카운터: E → 2E → 3E → 4E → 5E ---- */
  const cnt = document.getElementById("count");
  const cs = [[0, { opacity: 0, transform: "scale(0.5)" }]];
  for (let i = 0; i < N; i++) {
    const m = MERGE_T(i) + 0.16;           // 그 E 가 중앙에 닿는 순간
    cs.push([m - 0.001, { opacity: i === 0 ? 0 : 1, transform: "scale(1)" }, SNAP]);
    cs.push([m,         { opacity: 1, transform: "scale(1.18)" }, SNAP]);
    cs.push([m + 0.07,  { opacity: 1, transform: "scale(1)" }, LIN]);
  }
  cs.push([LOCK - 0.02, { opacity: 1, transform: "scale(1)" }, WHIP]);
  cs.push([LOCK + 0.01, { opacity: 0, transform: "scale(0.8)" }]);
  cs.push([17.90, { opacity: 0, transform: "scale(0.8)" }]);
  track(cnt, cs);

  /* ---- ② 최종 5E (150px) ---- */
  const LG = `translate(${LOGO_X}px, ${GROUP_Y}px)`;
  track(document.getElementById("final"), [
    [0,           { opacity: 0, transform: "translate(0,0) translateZ(-380px) scale(0.42)", filter: "blur(11px)" }],
    [LOCK - 0.12, { opacity: 0, transform: "translate(0,0) translateZ(-380px) scale(0.42)", filter: "blur(11px)" }, SNAP],
    [LOCK + 0.10, { opacity: 1, transform: "translate(0,0) translateZ(40px) scale(1.14)", filter: "blur(0px)" }, SNAP],
    [SLIDE,       { opacity: 1, transform: "translate(0,0) translateZ(0px) scale(1)", filter: "blur(0px)" }, SNAP],
    [SLIDE + 0.52,{ opacity: 1, transform: LG + " translateZ(0px) scale(1)", filter: "blur(0px)" }, LIN],
    [17.19,       { opacity: 1, transform: LG + " translateZ(0px) scale(1)", filter: "blur(0px)" }, WHIP],
    [17.90,          { opacity: 0, transform: LG + " translateZ(40px) scale(0.94)", filter: "blur(6px)" }],
  ]);
  track(document.getElementById("sweep"), [
    [0,           { transform: "translateX(0%) rotate(18deg)", opacity: 0 }],
    [LOCK + 0.24, { transform: "translateX(0%) rotate(18deg)", opacity: 0 }, LIN],
    [LOCK + 0.32, { transform: "translateX(70%) rotate(18deg)", opacity: 1 }, LIN],
    [LOCK + 0.96, { transform: "translateX(430%) rotate(18deg)", opacity: 1 }, LIN],
    [LOCK + 1.02, { transform: "translateX(440%) rotate(18deg)", opacity: 0 }],
    [17.90,          { transform: "translateX(440%) rotate(18deg)", opacity: 0 }],
  ]);

  track(document.getElementById("flash"), [
    [0,           { opacity: 0 }],
    [LOCK - 0.03, { opacity: 0 }, SNAP],
    [LOCK + 0.03, { opacity: 0.7 }, SNAP],
    [LOCK + 0.48, { opacity: 0 }],
    [17.90,          { opacity: 0 }],
  ]);
  track(document.getElementById("stage"), [
    [0,           { transform: "translate(0,0)" }],
    [LOCK - 0.01, { transform: "translate(0,0)" }, LIN],
    [LOCK + 0.05, { transform: "translate(-7px, 5px)" }, LIN],
    [LOCK + 0.11, { transform: "translate(6px, -5px)" }, LIN],
    [LOCK + 0.17, { transform: "translate(-3px, 2px)" }, SNAP],
    [LOCK + 0.36, { transform: "translate(0,0)" }],
    [17.90,          { transform: "translate(0,0)" }],
  ]);

  /* ---- 세로 정렬 ---- */
  [...document.querySelectorAll(".k5-stackword")].forEach((el, i) => {
    const b = el.querySelector("b");
    const X = STACK_EX - (b.offsetLeft + b.offsetWidth / 2);
    const Y = GROUP_Y + (i - 2) * LINE_H - el.offsetHeight / 2;
    const P = `translate(${X}px, ${Y}px)`;
    const t0 = SLIDE + 0.18 + i * 0.07;
    track(el, [
      [0,         { opacity: 0, transform: `translate(${X + 30}px, ${Y}px)`, filter: "blur(7px)" }],
      [t0,        { opacity: 0, transform: `translate(${X + 30}px, ${Y}px)`, filter: "blur(7px)" }, SNAP],
      [t0 + 0.40, { opacity: 1, transform: P, filter: "blur(0px)" }, LIN],
      [17.19,     { opacity: 1, transform: P, filter: "blur(0px)" }, WHIP],
      [17.90,        { opacity: 0, transform: P, filter: "blur(4px)" }],
    ]);

    /* ---- 합체 뒤: 위에서 아래로 흘러내리듯 파랗게 물든다 ----
       줄마다 0.13초씩 늦춰 물이 흘러내리는 것처럼 보이게 한다.
       글자 본체는 흰색 → 블루, E 는 과목색 → 밝은 블루. */
    // 본체는 계속 흰색. E 만 위에서 아래로 순서대로 파랗게 물든다.
    const wash = WASH0 + i * 0.15;
    track(b, [
      [0,          { color: EC[i] }],
      [wash,       { color: EC[i] }, SNAP],
      [wash + 0.40,{ color: BLUE_LT }, LIN],
      [17.90,         { color: BLUE_LT }],
    ]);
  });

  /* ---- ③ 한글 카피 ---- */
  const tagEl = document.getElementById("tag");
  const tX = -tagEl.offsetWidth / 2, tY = GROUP_Y + TAG_DY;
  const TG = `translate(${tX}px, ${tY}px)`;
  track(tagEl, [
    [0,         { opacity: 0, transform: `translate(${tX}px, ${tY + 16}px)`, filter: "blur(6px)" }],
    [TAGT,      { opacity: 0, transform: `translate(${tX}px, ${tY + 16}px)`, filter: "blur(6px)" }, SNAP],
    [TAGT + 0.38, { opacity: 1, transform: TG, filter: "blur(0px)" }, LIN],
    [17.19,     { opacity: 1, transform: TG, filter: "blur(0px)" }, WHIP],
    [17.90,        { opacity: 0, transform: TG, filter: "blur(4px)" }],
  ]);

  startLoop();
}

function syncCount(ms) {
  const s = ms / 1000, cnt = document.getElementById("count");
  if (!cnt) return;
  let n = 0;
  for (let i = 0; i < N; i++) if (s >= MERGE_T(i) + 0.16) n = i + 1;
  const txt = n <= 1 ? "E" : n + "E";
  if (cnt.textContent !== txt) cnt.textContent = txt;
}

function syncIdx(ms) {
  const s = ms / 1000, el = document.getElementById("idx");
  let n = 1;
  for (let i = 0; i < N; i++) if (s >= vIn(i)) n = i + 1;
  const txt = "0" + n + " / 0" + N;
  if (el.textContent !== txt) el.textContent = txt;
}

/* ===== 사운드 ===== */
let actx = null, soundOn = false;
function env(n, t, a, d, p) { const g = n.gain; g.setValueAtTime(0.0001, t); g.exponentialRampToValueAtTime(p, t + a); g.exponentialRampToValueAtTime(0.0001, t + a + d); }
function tickS(t, f, p) {
  const o = actx.createOscillator(), g = actx.createGain();
  o.type = "triangle"; o.frequency.setValueAtTime(f, t);
  env(g, t, 0.003, 0.12, p); o.connect(g).connect(actx.destination); o.start(t); o.stop(t + 0.25);
}
function boom(t, f, p) {
  const o = actx.createOscillator(), g = actx.createGain();
  o.type = "sine"; o.frequency.setValueAtTime(f * 2.2, t); o.frequency.exponentialRampToValueAtTime(f, t + 0.2);
  env(g, t, 0.006, 0.8, p); o.connect(g).connect(actx.destination); o.start(t); o.stop(t + 1.1);
}
function noiseBuf(sec) {
  const n = actx.sampleRate * sec, b = actx.createBuffer(1, n, actx.sampleRate), d = b.getChannelData(0);
  for (let i = 0; i < n; i++) d[i] = Math.random() * 2 - 1;
  return b;
}
function riser(t, dur) {
  const s = actx.createBufferSource(); s.buffer = noiseBuf(dur);
  const f = actx.createBiquadFilter(); f.type = "bandpass"; f.Q.value = 7;
  f.frequency.setValueAtTime(280, t); f.frequency.exponentialRampToValueAtTime(5000, t + dur);
  const g = actx.createGain();
  g.gain.setValueAtTime(0.0001, t);
  g.gain.exponentialRampToValueAtTime(0.15, t + dur * 0.9);
  g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
  s.connect(f).connect(g).connect(actx.destination); s.start(t); s.stop(t + dur);
}
function chord(t) {
  [196, 293.7, 392, 587.3].forEach((f, i) => {
    const o = actx.createOscillator(), g = actx.createGain();
    o.type = i < 2 ? "sine" : "triangle"; o.frequency.value = f;
    env(g, t, 0.02, 2.2, 0.065); o.connect(g).connect(actx.destination); o.start(t); o.stop(t + 2.6);
  });
}
function pad(t) {
  [98, 146.8].forEach((f) => {
    const o = actx.createOscillator(), g = actx.createGain(), lp = actx.createBiquadFilter();
    lp.type = "lowpass"; lp.frequency.value = 620;
    o.type = "sawtooth"; o.frequency.value = f;
    g.gain.setValueAtTime(0.0001, t);
    g.gain.exponentialRampToValueAtTime(0.030, t + 2.0);
    g.gain.setValueAtTime(0.030, t + 17.2);
    g.gain.exponentialRampToValueAtTime(0.0001, t + 19.4);
    o.connect(lp).connect(g).connect(actx.destination); o.start(t); o.stop(t + 20);
  });
}
function scheduleCycle(t0) {
  pad(t0);
  for (let i = 0; i < N; i++) tickS(t0 + vIn(i), 980, 0.045);
  for (let i = 0; i < N; i++) tickS(t0 + vOut(i) - 0.34, 1400 + i * 90, 0.035);
  riser(t0 + BACK0, LOCK - BACK0 + 0.05);
  boom(t0 + LOCK + 0.02, 60, 0.8);
  chord(t0 + LOCK + 0.05);
}
document.getElementById("sound").addEventListener("click", (e) => {
  const btn = e.currentTarget;
  if (!soundOn) {
    if (!actx) actx = new (window.AudioContext || window.webkitAudioContext)();
    actx.resume(); soundOn = true; btn.classList.add("on"); btn.textContent = "🔇 소리 끄기"; audioAnchor = null;
  } else { soundOn = false; btn.classList.remove("on"); btn.textContent = "🔊 소리 켜기"; if (actx) actx.suspend(); }
});

/* ===== 조작판 ===== */
/* ?clean=1 이면 조작판을 감추고 무대만 크게 띄운다 (화면 녹화용) */
if (new URLSearchParams(location.search).has("clean")) document.body.classList.add("clean");

const playBtn = document.getElementById("play");
const scrub = document.getElementById("scrub");
const timeEl = document.getElementById("time");
let playing = true, audioAnchor = null, lastMs = 0;
function setTime(ms) { anims.forEach(a => { a.currentTime = ms; }); syncIdx(ms); audioAnchor = null; }
function nowMs() { return anims.length ? Number(anims[0].currentTime || 0) % DUR : 0; }
playBtn.addEventListener("click", () => {
  playing = !playing;
  anims.forEach(a => playing ? a.play() : a.pause());
  playBtn.textContent = playing ? "⏸ 일시정지" : "▶ 재생"; audioAnchor = null;
});
document.getElementById("restart").addEventListener("click", () => setTime(0));
scrub.addEventListener("input", () => {
  if (playing) { playing = false; anims.forEach(a => a.pause()); playBtn.textContent = "▶ 재생"; }
  setTime(Number(scrub.value));
});
document.querySelectorAll("[data-rate]").forEach(b => {
  b.addEventListener("click", () => {
    document.querySelectorAll("[data-rate]").forEach(o => o.classList.remove("on"));
    b.classList.add("on");
    anims.forEach(a => { a.playbackRate = Number(b.dataset.rate); });
  });
});
/* 영상을 타임라인에 물린다.
   자기 차례인 영상만 재생하고, 나머지는 멈춰서 0초로 되감아 둔다.
   스크럽할 때도 그 시점의 프레임이 나오도록 currentTime 을 직접 맞춘다. */
const VIDS = [...document.querySelectorAll(".k5-clip video")];
/* 렌더러(tools/render-intro.js)가 쓰는 프레임 정확 seek.
   재생 중 보정과 달리, 지정한 시각의 프레임이 '실제로 그려질 때까지' 기다린다.
   이걸 안 기다리면 캡처가 이전 프레임을 찍어 영상이 튄다. */
window.__K5_SRC_FPS = 30;   // 원본 영상 프레임레이트 (5개 모두 30fps)
window.__k5seek = function (sec) {
  const fps = window.__K5_SRC_FPS;
  return Promise.all(VIDS.map((v, i) => {
    const a = VIN_T[i], b = VOUT_T[i];
    if (sec < a || sec >= b + 0.05) { v.pause(); return Promise.resolve(); }
    v.pause();
    let want = Math.min(Math.max(0, sec - a), (v.duration || VDUR[i]) - 0.03);
    // 원본이 30fps 인데 60fps 로 임의 시각을 seek 하면, 프레임 사이 지점마다
    // 디코더가 매번 조금씩 다른 결과를 돌려줘 화면이 미세하게 튄다.
    // 원본 프레임 격자에 딱 맞춰 요청하면 같은 프레임이 항상 같게 나온다.
    want = (Math.floor(want * fps) + 0.5) / fps;
    if (Math.abs(v.currentTime - want) < 0.002) return Promise.resolve();
    return new Promise((done) => {
      let settled = false;
      const finish = () => { if (!settled) { settled = true; done(); } };
      // 프레임이 '실제로 그려졌을 때' 알려주는 신호. seeked 보다 정확하다.
      if (v.requestVideoFrameCallback) v.requestVideoFrameCallback(() => finish());
      v.addEventListener("seeked", finish, { once: true });
      setTimeout(finish, 600);          // 신호가 안 와도 멈추지 않게
      try { v.currentTime = want; } catch (e) { finish(); }
    });
  }));
};

function syncVideos(ms) {
  const s = ms / 1000;
  VIDS.forEach((v, i) => {
    const a = VIN_T[i], b = VOUT_T[i];
    const active = s >= a && s < b + 0.05;
    if (!active) {
      if (!v.paused) v.pause();
      if (v.currentTime !== 0) { try { v.currentTime = 0; } catch (e) {} }
      return;
    }
    const want = Math.min(Math.max(0, s - a), (v.duration || VDUR[i]) - 0.02);
    // 재생 중에는 0.25초 이상 어긋날 때만 보정한다 (매 프레임 seek 하면 끊긴다)
    if (playing) {
      if (Math.abs(v.currentTime - want) > 0.25) { try { v.currentTime = want; } catch (e) {} }
      if (v.paused) v.play().catch(() => {});
    } else {
      if (!v.paused) v.pause();
      if (Math.abs(v.currentTime - want) > 0.02) { try { v.currentTime = want; } catch (e) {} }
    }
  });
}

function startLoop() {
  (function t2() {
    const ms = nowMs();
    syncVideos(ms);
    if (playing) scrub.value = String(Math.round(ms));
    timeEl.textContent = (ms / 1000).toFixed(2) + "s / 15s";
    syncIdx(ms); syncCount(ms);
    if (soundOn && playing && actx) {
      if (audioAnchor === null || ms < lastMs) { audioAnchor = actx.currentTime - ms / 1000; scheduleCycle(audioAnchor); }
    }
    lastMs = ms;
    requestAnimationFrame(t2);
  })();
}
</script>
</body>
