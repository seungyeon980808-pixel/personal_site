<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script>
    (function () {
      try {
        var t = localStorage.getItem("theme");
        document.documentElement.setAttribute("data-theme", t === "light" ? "light" : "dark");
      } catch (e) {}
    })();
  </script>
  <title>ModiPdf · 박승연</title>
  <link rel="icon" type="image/svg+xml" href="../assets/logo-modipdf.svg" />
  <meta name="description" content="박승연이 만든 도구 ModiPdf — 대표 기능과 시연을 확인하세요." />
  <meta property="og:type" content="article" />
  <meta property="og:site_name" content="박승연 · personal site" />
  <meta property="og:title" content="ModiPdf · 박승연" />
  <meta property="og:description" content="박승연이 만든 도구 ModiPdf — 대표 기능과 시연을 확인하세요." />
  <meta property="og:url" content="https://seungyeon980808-pixel.github.io/personal_site/projects/modipdf.html" />
  <meta property="og:image" content="https://seungyeon980808-pixel.github.io/personal_site/assets/og-image.png" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="ModiPdf · 박승연" />
  <meta name="twitter:description" content="박승연이 만든 도구 ModiPdf — 대표 기능과 시연을 확인하세요." />
  <meta name="twitter:image" content="https://seungyeon980808-pixel.github.io/personal_site/assets/og-image.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans+KR:wght@400;500;600;700&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="../assets/detail.css" />
</head>
<body data-project="modipdf">

  <!-- ===== TOP BAR ===== -->
  <div class="topbar">
    <a class="home" href="../index.html">← 홈</a>
    <span class="crumb" id="crumb">projects / ModiPdf</span>
    <span class="spacer"></span>
    <span class="edit-badge">편집 모드</span>
    <div class="admin-area">
      <span class="user-email" id="userEmail"></span>
      <button class="save-btn" id="saveBtn" type="button">저장</button>
      <button class="admin-btn" id="adminBtn" type="button">관리자 로그인</button>
    </div>
  </div>

  <!-- ===== HERO ===== -->
  <header class="detail-hero reveal">
    <div class="wrap">
      <span class="eyebrow"><span class="dot"></span> PROJECT</span>
      <div class="detail-headline">
        <img class="detail-icon" src="../assets/logo-modipdf.svg" alt="ModiPdf 로고" />
        <h1 class="detail-title" data-editable data-field="hero.title">ModiPdf</h1>
      </div>
      <p class="detail-tagline" data-editable data-field="hero.tagline">한 줄 소개 — 이 도구가 무엇을 해결하는지 적어주세요.</p>
      <div class="detail-meta">
        <span class="stack" data-editable data-field="hero.stack">스택</span>
        <span class="status" data-status="기획중" data-field="hero.status">기획중</span>
      </div>
      <div class="cta-row">
        <a class="cta primary" href="#" target="_blank" rel="noopener" data-link="live">라이브 열기 ↗</a>
        <a class="cta ghost" href="#" target="_blank" rel="noopener" data-link="github">GitHub ↗</a>
      </div>
    </div>
  </header>

  <!-- ===== FEATURES (assets/detail.js 가 동적 렌더) ===== -->
  <main class="features">
    <div class="wrap">
      <div id="featureList"></div>
      <button id="addFeatureBtn" type="button">+ 기능 추가</button>
    </div>
  </main>

  <!-- ===== COMMENTS / 후기 ===== -->
  <section class="comments reveal">
    <div class="wrap">
      <h2>후기 · 의견</h2>
      <p class="sub">이 도구를 써본 후기나 버그·개선 의견을 남겨주세요 · <span id="commentCount">0</span>개</p>
      <form class="comment-form" id="commentForm">
        <div class="name-row">
          <input type="text" id="commentName" placeholder="이름" maxlength="30" autocomplete="off" />
        </div>
        <textarea id="commentText" placeholder="후기나 의견을 적어주세요 (최대 500자)" maxlength="500"></textarea>
        <div class="submit-row">
          <button type="submit" class="comment-submit">후기 남기기</button>
        </div>
      </form>
      <div class="comment-list" id="commentList"></div>
    </div>
  </section>

  <!-- ===== FOOTER ===== -->
  <footer class="detail-foot">
    <div class="wrap" style="display:flex; align-items:center; justify-content:space-between; gap:16px; flex-wrap:wrap; width:100%;">
      <a href="../index.html">← 다른 프로젝트 보기</a>
      <span class="mono">박승연 · 2026</span>
    </div>
  </footer>

  <!-- Theme toggle -->
  <button id="themeToggle" class="theme-toggle" type="button" aria-label="라이트/다크 전환">
    <svg class="i-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/></svg>
    <svg class="i-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4.5"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>
  </button>

  <script type="module" src="../assets/detail.js"></script>
</body>
</html>
